# 生产部署 compose —— 用仓库 Dockerfile 构建包含平台化改动的自定义镜像。
# 用法见 DEPLOY.md：
#   docker compose -f compose.prod.yml build
#   docker compose -f compose.prod.yml up -d
# 注意：不要叠加 compose.dev.yml（那是本地源码挂载用）。

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "10"

networks:
  leedu-network:
    driver: bridge

volumes:
  data_mysql:
  data_redis:
  data_meilisearch:

services:
  leedu:
    build:
      context: .
      dockerfile: Dockerfile
    image: leedu-platform:latest
    restart: always
    environment:
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_PORT=${REDIS_PORT}
      - QUEUE_DRIVER=${QUEUE_DRIVER}
      - APP_KEY=${APP_KEY}
      - JWT_SECRET=${JWT_SECRET}
      - MEILISEARCH_HOST=${MEILISEARCH_HOST}
      - MEILISEARCH_KEY=${MEILISEARCH_KEY}
    ports:
      # 生产建议在前面再加一层 Nginx/HTTPS 反代到这些端口
      - 8000:8000  # API
      - 8100:8100  # PC
      - 8200:8200  # H5
      - 8300:8300  # Admin
    networks:
      - leedu-network
    depends_on:
      - mysql
      - redis
    logging: *default-logging

  redis:
    image: registry.cn-hangzhou.aliyuncs.com/hzbs/redis:7.0.12
    restart: always
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - data_redis:/data
    networks:
      - leedu-network
    logging: *default-logging

  mysql:
    image: registry.cn-hangzhou.aliyuncs.com/hzbs/mysql:8.1
    restart: always
    environment:
      - MYSQL_DATABASE=${DB_DATABASE}
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD}
    volumes:
      - data_mysql:/var/lib/mysql
    networks:
      - leedu-network
    logging: *default-logging

  meilisearch:
    image: registry.cn-hangzhou.aliyuncs.com/hzbs/meilisearch:0.24.0
    restart: always
    volumes:
      - data_meilisearch:/meili_data
    networks:
      - leedu-network
    logging: *default-logging
